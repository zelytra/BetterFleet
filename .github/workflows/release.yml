name: "Publish"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    name: Tauri app
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ windows-latest ]
    defaults:
      run:
        working-directory: 'webapp'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'webapp/src-tauri'

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install webapp dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "BetterFleet v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false

  publish-backend:
    name: Backend app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set Docker tags
        id: docker-tags
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tags=zelytra/better-fleet-backend:latest,zelytra/better-fleet-backend:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=zelytra/better-fleet-backend:latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: backend/
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}

  publish-website:
    name: Website app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set Docker tags
        id: docker-tags
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tags=zelytra/better-fleet-website:latest,zelytra/better-fleet-website:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=zelytra/better-fleet-website:latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: website/
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
