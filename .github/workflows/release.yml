name: "Publish"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.2.0 or v1.2.0). Defaults to latest v* tag."
        required: false
        type: string
      dry_run:
        description: "Build & test everything but publish nothing (no GitHub release, no :latest Docker push, no master sync)."
        required: false
        type: boolean
        default: false

# Never cancel an in-flight release; let it finish publishing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            RAW="${{ github.ref_name }}"
          elif [ -n "${{ inputs.version }}" ]; then
            RAW="${{ inputs.version }}"
          else
            RAW="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          fi

          if [ -z "${RAW}" ]; then
            echo "No version found. Push a v* tag or pass workflow_dispatch version input." >&2
            exit 1
          fi

          VERSION="${RAW#v}"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver: ${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

  verify:
    name: Verify (build & test) before publishing
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Backend tests
        working-directory: backend
        run: mvn test --batch-mode

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Webapp build
        working-directory: webapp
        run: npm ci && npm run build

      - name: Website build
        working-directory: website
        run: npm ci && npm run build

  publish-tauri:
    needs: [resolve-version, verify]
    name: Tauri app
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    defaults:
      run:
        working-directory: webapp
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Set version from tag
        working-directory: ${{ github.workspace }}
        run: node .github/scripts/set-version-from-tag.mjs "${{ needs.resolve-version.outputs.tag }}"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: webapp/src-tauri

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install webapp dependencies
        run: npm ci

      - name: Run Rust tests
        working-directory: webapp/src-tauri
        env:
          BETTERFLEET_TEST_BUILD: "1"
        run: cargo test

      - name: Build Tauri app (dry-run, no publish)
        if: ${{ inputs.dry_run }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Build & publish Tauri release
        if: ${{ !inputs.dry_run }}
        # Pinned to v0: tauri-action v1 assumes a Tauri v2 config (top-level "identifier")
        # and fails this Tauri v1 project with "base config has no bundle identifier".
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "BetterFleet v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false

  publish-backend:
    needs: [resolve-version, verify]
    name: Backend app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Set version from tag
        run: node .github/scripts/set-version-from-tag.mjs "${{ needs.resolve-version.outputs.tag }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker tags
        id: docker-tags
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tags=zelytra/better-fleet-backend:latest,zelytra/better-fleet-backend:${{ needs.resolve-version.outputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "tags=zelytra/better-fleet-backend:latest" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: backend/
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.docker-tags.outputs.tags }}

  publish-website:
    needs: [resolve-version, verify]
    name: Website app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Set version from tag
        run: node .github/scripts/set-version-from-tag.mjs "${{ needs.resolve-version.outputs.tag }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker tags
        id: docker-tags
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tags=zelytra/better-fleet-website:latest,zelytra/better-fleet-website:${{ needs.resolve-version.outputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "tags=zelytra/better-fleet-website:latest" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: website/
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.docker-tags.outputs.tags }}

  sync-version-to-master:
    needs:
      - resolve-version
      - publish-tauri
      - publish-backend
      - publish-website
    if: github.ref_type == 'tag'
    name: Sync version to master
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0
          # Push to the protected master branch authenticated as an admin, which bypasses the
          # "require a pull request" rule (enforce_admins is off). Set a RELEASE_PAT secret to a
          # fine-grained PAT (Contents: read/write on this repo) owned by an admin. Falls back to
          # GITHUB_TOKEN when the secret is absent — the push then simply warns instead of syncing.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Set version from tag
        run: node .github/scripts/set-version-from-tag.mjs "${{ needs.resolve-version.outputs.tag }}"

      - name: Commit version bump to master
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -uo pipefail
          FILES=(
            webapp/package.json
            webapp/src-tauri/Cargo.toml
            webapp/src-tauri/tauri.conf.json
            backend/src/main/resources/application.properties
            website/package.json
          )

          if git diff --quiet -- "${FILES[@]}"; then
            echo "Version files already up to date on master."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${FILES[@]}"
          git commit -m "chore: bump version to ${VERSION} [skip ci]"

          # Pushing to master requires github-actions[bot] to be on the bypass list of master's
          # branch protection AND its ruleset. If the push is rejected, warn and exit 0 so this
          # trailing sync never fails an otherwise-successful release — the version is already
          # correct in every published artifact.
          if git push origin HEAD:master; then
            echo "Pushed version bump to master."
          else
            echo "::warning::Could not push the version bump to master. Add github-actions[bot] to the branch-protection AND ruleset bypass lists to enable it. Version ${VERSION} is already correct in all published artifacts."
          fi
