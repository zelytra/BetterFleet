name: "CI"

on:
  pull_request: # Triggered on pull requests to any branch
  push:
    branches: # Additionally, trigger on push events to specific branches
      - master

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  paths:
    name: Check for Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      webapp: ${{ steps.filter.outputs.webapp }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v7

      - name: Paths Filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            webapp:
              - 'webapp/**'
              - '.github/workflows/ci.yml'
            website:
              - 'website/**'
              - '.github/workflows/ci.yml'

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: paths
    if: ${{ needs.paths.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: 'backend'
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn quarkus:build package -DskipTests

  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: paths
    if: ${{ needs.paths.outputs.backend == 'true' }}
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: 'backend'
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and Run Tests
        run: mvn test --batch-mode --fail-at-end
      - name: Publish Test Report
        if: always()
        uses: scacap/action-surefire-report@v1

  webapp-build:
    name: Webapp Build
    runs-on: ubuntu-latest
    needs: paths
    if: ${{ needs.paths.outputs.webapp == 'true' }}
    defaults:
      run:
        working-directory: 'webapp'
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci
      - run: npm run build --if-present

  webapp-analysis:
    name: Webapp Analysis
    runs-on: ubuntu-latest
    needs: paths
    if: ${{ needs.paths.outputs.webapp == 'true' }}
    defaults:
      run:
        working-directory: 'webapp'
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci
      - run: npm run prettier:check --if-present
      - run: npm run lint:check --if-present

  webapp-test:
    name: Webapp Unit Tests
    runs-on: ubuntu-latest
    needs: paths
    if: ${{ needs.paths.outputs.webapp == 'true' }}
    defaults:
      run:
        working-directory: 'webapp'
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci
      - run: npm run test --if-present

  website-build:
    name: Website Build
    runs-on: ubuntu-latest
    needs: paths
    if: ${{ needs.paths.outputs.website == 'true' }}
    defaults:
      run:
        working-directory: 'website'
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build --if-present

  website-analysis:
    name: Website Analysis
    runs-on: ubuntu-latest
    needs: paths
    if: ${{ needs.paths.outputs.website == 'true' }}
    defaults:
      run:
        working-directory: 'website'
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run prettier:check --if-present
      - run: npm run lint:check --if-present

  website-test:
    name: Website Unit Tests
    runs-on: ubuntu-latest
    needs: paths
    if: ${{ needs.paths.outputs.website == 'true' }}
    defaults:
      run:
        working-directory: 'website'
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run test --if-present

  test-tauri:
    name: Tauri Build Test
    runs-on: ${{ matrix.platform }}
    needs: [paths, webapp-build]
    if: ${{ needs.paths.outputs.webapp == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest] # Add other platforms if needed
    defaults:
      run:
        working-directory: 'webapp'
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'webapp/src-tauri'

      - name: Install dependencies on Ubuntu
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Webapp Dependencies
        run: npm ci

      - name: Build Tauri App
        # Pinned to v0: tauri-action v1 assumes a Tauri v2 config (top-level "identifier")
        # and fails this Tauri v1 project with "base config has no bundle identifier".
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

  # The Rust detection logic (pick_server_flow, the FlowAggregator, the #364/#657 capture fixtures,
  # the port range) has unit tests that never ran in CI — test-tauri only *builds* the app. This runs
  # them. windows-latest because the crate is Windows-only: it captures packets through winsock raw
  # sockets (std::os::windows, winapi), so it does not compile anywhere else.
  tauri-test:
    name: Tauri Unit Tests
    runs-on: ${{ matrix.platform }}
    needs: [paths, webapp-build]
    if: ${{ needs.paths.outputs.webapp == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    defaults:
      run:
        working-directory: 'webapp'
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'webapp/src-tauri'

      - name: Install Webapp Dependencies
        run: npm ci

      # main.rs runs tauri::generate_context!, which embeds the frontend (distDir ../dist) at compile
      # time — so `cargo test` cannot build the crate until the frontend exists.
      - name: Build the frontend
        run: npm run build

      - name: Run the Rust tests
        working-directory: 'webapp/src-tauri'
        # build.rs stamps a requireAdministrator manifest into the binary; the test harness then fails
        # to spawn on Windows with "os error 740" (elevation required). This env drops it to asInvoker
        # for test builds only. See webapp/src-tauri/build.rs.
        env:
          BETTERFLEET_TEST_BUILD: '1'
        run: cargo test
