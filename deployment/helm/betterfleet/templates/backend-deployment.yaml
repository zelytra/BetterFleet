{{- $component := "backend" -}}
{{- $ctx := dict "root" $ "component" $component -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "betterfleet.componentName" $ctx }}
  labels:
    {{- include "betterfleet.labels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "betterfleet.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "betterfleet.selectorLabels" $ctx | nindent 8 }}
      annotations:
        {{- /* Roll pods when the credentials Secret changes. */}}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "betterfleet.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $component }}
          image: {{ include "betterfleet.image" (dict "root" $ "image" .Values.backend.image) }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          {{- with .Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DB_HOST
              value: {{ include "betterfleet.appDbHost" . | quote }}
            - name: DB_DATABASE
              value: {{ .Values.backend.database.name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "betterfleet.secretName" . }}
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "betterfleet.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: KEYCLOAK_HOST
              value: {{ include "betterfleet.keycloakPublicUrl" . | quote }}
            - name: PROXY_CHECK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "betterfleet.secretName" . }}
                  key: PROXY_CHECK_API_KEY
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.backend.probes.enabled }}
          livenessProbe:
            {{- toYaml .Values.backend.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.probes.readiness | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
