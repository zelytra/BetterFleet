{{- if .Values.postgresAuth.enabled -}}
{{- $component := "postgres-auth" -}}
{{- $ctx := dict "root" $ "component" $component -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "betterfleet.componentName" $ctx }}
  labels:
    {{- include "betterfleet.labels" $ctx | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: {{ .Values.postgresAuth.service.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "betterfleet.selectorLabels" $ctx | nindent 4 }}
{{- end }}
