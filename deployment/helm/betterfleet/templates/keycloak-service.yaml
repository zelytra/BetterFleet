{{- $component := "keycloak" -}}
{{- $ctx := dict "root" $ "component" $component -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "betterfleet.componentName" $ctx }}
  labels:
    {{- include "betterfleet.labels" $ctx | nindent 4 }}
spec:
  type: {{ .Values.keycloak.service.type }}
  ports:
    - name: http
      port: {{ .Values.keycloak.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.keycloak.health.enabled }}
    - name: management
      port: {{ .Values.keycloak.health.port }}
      targetPort: management
      protocol: TCP
    {{- end }}
  selector:
    {{- include "betterfleet.selectorLabels" $ctx | nindent 4 }}
